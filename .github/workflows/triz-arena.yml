name: TRIZ Arena

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC
  workflow_dispatch:
    inputs:
      participants:
        description: 'Comma-separated participant names (empty = all)'
        required: false
        default: ''
      problems:
        description: 'Comma-separated problem IDs (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: triz-engine
        run: pip install -e ".[dev,benchmark]"

      - name: Run tests
        working-directory: triz-engine
        run: pytest --tb=short

      - name: Run TRIZ Arena benchmark
        working-directory: triz-engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python3 -c "
          import json, os, sys
          from pathlib import Path
          from benchmark.elo import run_tournament
          from benchmark.leaderboard import generate_leaderboard

          # Parse workflow inputs
          input_participants = '${{ github.event.inputs.participants }}'.strip()
          input_problems = '${{ github.event.inputs.problems }}'.strip()

          # Determine participants
          participants_dir = Path('benchmark/participants')
          all_configs = {}
          for f in sorted(participants_dir.glob('*.json')):
              with open(f) as fh:
                  config = json.load(fh)
                  all_configs[config['name']] = config

          if input_participants:
              participant_names = [p.strip() for p in input_participants.split(',')]
          else:
              participant_names = list(all_configs.keys())

          # Filter to available participants (check API keys)
          available = []
          for name in participant_names:
              config = all_configs.get(name)
              if config is None:
                  continue
              requires_env = config.get('invocation', {}).get('requires_env', [])
              if all(os.environ.get(e) for e in requires_env):
                  available.append(name)
          participant_names = available

          # Determine problems
          if input_problems:
              problem_ids = [p.strip() for p in input_problems.split(',')]
          else:
              problem_ids = sorted(p.stem for p in Path('benchmark/problems').glob('TB-*.json'))

          print(f'Participants: {participant_names}')
          print(f'Problems: {problem_ids}')

          if len(participant_names) < 2:
              print('Not enough participants to run tournament')
              sys.exit(0)

          # Run benchmark using the real runner
          from benchmark.runner import run_benchmark
          scores = run_benchmark(
              problem_ids=problem_ids,
              participant_names=participant_names,
              budget_usd=2.00,
          )

          # Generate tournament and leaderboard
          result = run_tournament(participant_names, problem_ids, scores)
          generate_leaderboard(
              ratings=result['ratings'],
              confidence_intervals=result['confidence_intervals'],
              problem_scores=scores,
              problem_ids=problem_ids,
              output_path=Path('LEADERBOARD.md'),
              match_count=result['match_count'],
          )

          # Save ratings
          ratings_dir = Path('ratings')
          ratings_dir.mkdir(exist_ok=True)
          (ratings_dir / 'latest.json').write_text(json.dumps(result, indent=2))

          print('Leaderboard generated successfully')
          "

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triz-engine/LEADERBOARD.md triz-engine/ratings/ triz-engine/results/ || true
          git diff --cached --quiet || git commit -m "chore: update TRIZ Arena leaderboard [skip ci]"
          git push || true
