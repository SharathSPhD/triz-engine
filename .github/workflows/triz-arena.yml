name: TRIZ Arena

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      participants:
        description: 'Comma-separated participant names (empty = all non-external)'
        required: false
        default: ''
      problems:
        description: 'Comma-separated problem IDs (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: triz-engine
        run: pip install -e ".[dev,benchmark]"

      - name: Run tests
        working-directory: triz-engine
        run: pytest --tb=short

      - name: Run TRIZ Arena benchmark
        working-directory: triz-engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python3 -c "
          import json, sys
          from pathlib import Path
          from benchmark.runner import run_benchmark, extract_scores
          from benchmark.elo import run_tournament
          from benchmark.leaderboard import generate_leaderboard, load_dimension_scores

          input_participants = '${{ github.event.inputs.participants }}'.strip()
          input_problems = '${{ github.event.inputs.problems }}'.strip()

          participant_names = None
          if input_participants:
              participant_names = [p.strip() for p in input_participants.split(',')]

          problem_ids = None
          if input_problems:
              problem_ids = [p.strip() for p in input_problems.split(',')]

          # Run benchmark (dynamic participant loading handles availability)
          results = run_benchmark(
              problem_ids=problem_ids,
              participant_names=participant_names,
              budget_usd=2.00,
              use_llm_judge=True,
          )

          scores = extract_scores(results)

          # Determine actual participants and problems from results
          actual_participants = sorted(set(p for p, _ in scores))
          actual_problems = sorted(set(pid for _, pid in scores))

          if len(actual_participants) < 2:
              print('Not enough participants with successful runs for tournament')
              sys.exit(0)

          # Generate tournament and leaderboard
          result = run_tournament(actual_participants, actual_problems, scores)

          # Collect dimension scores for per-dimension breakdown
          dim_scores = {}
          for (pname, pid), r in results.items():
              if r.get('status') in ('success', 'RunStatus.SUCCESS'):
                  dims = r.get('scores', {}).get('dimensions', {})
                  if dims:
                      dim_scores[(pname, pid)] = dims

          generate_leaderboard(
              ratings=result['ratings'],
              confidence_intervals=result['confidence_intervals'],
              problem_scores=scores,
              problem_ids=actual_problems,
              output_path=Path('LEADERBOARD.md'),
              match_count=result['match_count'],
              dimension_scores=dim_scores,
          )

          # Save ratings
          ratings_dir = Path('ratings')
          ratings_dir.mkdir(exist_ok=True)
          (ratings_dir / 'latest.json').write_text(json.dumps(result, indent=2))

          print('Leaderboard generated successfully')
          "

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triz-engine/LEADERBOARD.md triz-engine/ratings/ triz-engine/results/ || true
          git diff --cached --quiet || git commit -m "chore: update TRIZ Arena leaderboard [skip ci]"
          git push || true
